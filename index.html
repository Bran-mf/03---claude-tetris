<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section">
          <span class="label">MAX COMBO</span>
          <span class="value" id="max-combo">0</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section controls">
          <span class="label">POWER-UPS</span>
          <ul>
            <li>💣 Bomba: limpia 3×3</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">THEME</span>
          <button id="theme-btn" class="theme-toggle">Light</button>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select" class="skin-select">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel Art</option>
          </select>
        </div>
      </aside>
    </div>

    <!-- Start overlay (shown on page load) -->
    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <p class="overlay-title-text">TETRIS</p>
        <div id="start-highscores" class="highscores-container"></div>
        <button id="play-btn" class="overlay-btn">Jugar</button>
        <button id="reset-scores-btn" class="overlay-btn overlay-btn-secondary">Resetear récords</button>
      </div>
    </div>

    <!-- Game over / pause overlay -->
    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Save score form (shown after game over) -->
        <div id="save-score-section" class="save-score-section hidden">
          <input id="player-name" class="player-name-input" type="text" maxlength="20" placeholder="Tu nombre" />
          <button id="save-btn" class="overlay-btn">Guardar</button>
        </div>

        <!-- High-score table (shown after saving) -->
        <div id="gameover-highscores" class="highscores-container"></div>

        <button id="restart-btn" class="overlay-btn">Reiniciar</button>

        <!-- Pause-specific controls (hidden when game over) -->
        <div id="pause-menu" class="pause-menu hidden">
          <button id="pause-resume-btn">Reanudar</button>
          <button id="pause-restart-btn">Reiniciar</button>
          <button id="pause-controls-btn">Ver controles</button>
          <div id="pause-controls-panel" class="pause-controls-panel hidden">
            <ul>
              <li><kbd>←</kbd><kbd>→</kbd> mover</li>
              <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
              <li><kbd>↓</kbd> bajar</li>
              <li><kbd>Space</kbd> caída dura</li>
              <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
            </ul>
          </div>
          <div class="pause-level-row">
            <label for="pause-start-level">Nivel inicial:</label>
            <select id="pause-start-level"></select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
