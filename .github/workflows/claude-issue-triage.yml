name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    # Skip bot-authored issues and the @claude assistant flow (handled by claude.yml)
    if: |
      github.actor != 'github-actions[bot]' &&
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.issue.body, '@claude') &&
      !contains(github.event.issue.title, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Triage and diagnose issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --allowedTools
            "Bash(gh issue view *),Bash(gh issue comment *),Bash(gh issue edit *),Bash(gh label list *),Bash(gh label create *)"
          prompt: |
            You are an automated issue triage assistant for a browser-based Tetris game.
            The game is implemented in three files: `game.js`, `style.css`, and `index.html`.
            No frameworks or build tools are used — pure vanilla HTML/CSS/JavaScript.

            ## Your task for issue #${{ github.event.issue.number }}

            ### Step 1 — Ensure the label set exists
            Run `gh label list --repo ${{ github.repository }} --json name` and compare against
            the required labels below. For any missing label, create it with `gh label create`.

            Required labels (name | color | description):
            - bug             | #d73a4a | Something isn't working
            - enhancement     | #a2eeef | New feature or request
            - question        | #d876e3 | Further information is requested
            - documentation   | #0075ca | Improvements or additions to documentation
            - rendering       | #f9d71c | Visual / canvas rendering issues
            - controls        | #e99695 | Keyboard input or piece movement issues
            - scoring         | #c5def5 | Score, level, or line-clear issues
            - game-logic      | #bfd4f2 | Core Tetris mechanics (rotation, collision, gravity)
            - performance     | #d4c5f9 | Lag, frame rate, or timing issues
            - ui/style        | #fef2c0 | CSS, layout, or non-canvas visual issues
            - needs-triage    | #e4e669 | Issue has not yet been fully triaged
            - claude-diagnosed | #0e8a16 | Claude has posted an automated diagnosis

            ### Step 2 — Read the issue
            Run: `gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }}`

            ### Step 3 — Read the source files
            Read `game.js`, `style.css`, and `index.html` from the checked-out repo to
            understand the codebase and ground your diagnosis.

            ### Step 4 — Apply labels
            Based on the issue content and your understanding of the code, apply the labels
            that best fit using:
              `gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label "<label1>,<label2>,..."`

            Always add `claude-diagnosed`. Remove `needs-triage` if it was previously set.
            Apply 1–3 content labels from the set above (type + area). Never add a label
            that does not exist in the repo.

            ### Step 5 — Post a diagnosis comment
            Post exactly ONE comment using:
              `gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "<body>"`

            The comment must follow this structure (use markdown):

            ```
            ## 🤖 Claude Issue Diagnosis

            **Summary:** One sentence restating the problem.

            **Labels applied:** list the labels you added.

            **Suspected area:** Which file(s) and section of code are most likely involved
            (e.g. `game.js` — rotation/collision logic around the `rotate()` function).

            **Likely root cause:** 2–4 sentences explaining what you think is wrong based on
            the issue description and the actual source code you read.

            **Suggested fix direction:** 2–4 sentences describing where a developer should
            look and what kind of change would likely resolve the issue. Do NOT write code.

            ---
            *Automated diagnosis by Claude — review before acting on it.*
            ```

            ### Rules
            - Do NOT edit the issue body.
            - Do NOT write or suggest code snippets.
            - Do NOT post more than one comment.
            - If the issue is a question or feature request rather than a bug, adjust your
              tone accordingly (no "root cause" for an enhancement — describe the relevant
              area and what an implementation might touch instead).
